name: Publish browserless image

# ─────────────────────────────────────────────────────────────────────────────
# Workflow de build/publish da imagem Docker `pdf-block-browserless` no GHCR.
#
# Este workflow vive em packages/laravel/.github/workflows/ dentro do monorepo
# e é espelhado automaticamente pelo `pnpm release:laravel` no repositório
# público https://github.com/uotz/pdf-block-laravel — onde efetivamente roda.
#
# ─── Gatilhos ────────────────────────────────────────────────────────────────
#
# 1. Tag semver (automático, recomendado)
#    Disparado toda vez que `pnpm release:laravel X.Y.Z` publica uma nova tag
#    `vX.Y.Z` no repositório público. Produz as tags de imagem:
#        ghcr.io/uotz/pdf-block-browserless:vX.Y.Z
#        ghcr.io/uotz/pdf-block-browserless:vX.Y
#        ghcr.io/uotz/pdf-block-browserless:latest    (em tags estáveis)
#
#    → Cada release do pacote Composer gera uma imagem versionada casada.
#
# 2. Push para main tocando arquivos da imagem (automático, out-of-band)
#    Dispara quando `Dockerfile.browserless` ou `docker/install-fonts.sh`
#    mudam fora de um release formal. Produz apenas `:latest`.
#
#    → Útil para patches na imagem sem bumping de versão do pacote.
#
# 3. workflow_dispatch (manual)
#    Botão "Run workflow" no GitHub Actions. Permite rebuild sob demanda
#    (ex.: versão nova do upstream `ghcr.io/browserless/chromium:latest`).
#    Produz apenas `:latest`.
#
# ─── Arquivos que afetam a imagem ────────────────────────────────────────────
#   - Dockerfile.browserless     → receita da imagem
#   - docker/install-fonts.sh    → script que baixa as 20 fontes corporativas
#
# Se você tocar em qualquer outro arquivo e quiser forçar rebuild, use
# workflow_dispatch ou um release com `pnpm release:laravel`.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    # Tags semver → build versionado. Tags não respeitam o filtro `paths`,
    # então toda tag v* dispara um build — casa 1:1 com `release:laravel`.
    tags:
      - 'v*.*.*'
    # Pushes diretos em main que alterem arquivos da imagem.
    branches:
      - main
    paths:
      - 'Dockerfile.browserless'
      - 'docker/install-fonts.sh'
  workflow_dispatch:
    inputs:
      tag_as_latest:
        description: 'Aplicar tag :latest no build manual'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pdf-block-browserless

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Metadata action lida com as 3 fontes de gatilho de forma unificada:
      #   - tag semver → vX.Y.Z + vX.Y + latest (em tags estáveis)
      #   - push em main → latest (branch default)
      #   - workflow_dispatch → latest (controlado pelo input)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag_as_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=pdf-block-browserless
            org.opencontainers.image.description=Browserless v2 + Noto Color Emoji + 20 corporate fonts, pré-instaladas para o driver browserless do pdf-block/laravel
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.browserless
          # Multi-arch: amd64 cobre servidores comuns; arm64 cobre Apple Silicon
          # local e Graviton/ARM em cloud. Se o build ficar lento, reduza para
          # apenas linux/amd64.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de camadas entre builds (acelera rebuilds subsequentes).
          cache-from: type=gha
          cache-to: type=gha,mode=max
